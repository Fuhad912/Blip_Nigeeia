<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password - Blip | Learning Just Got More Fun</title>
  <meta name="description" content="Set a new password for your Blip account.">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  
  <div class="page-transition" id="pageTransition">
    <div class="loader-blob"></div>
  </div>

  <main class="auth-wrapper" style="align-items: center; justify-content: center;">
    <div class="blob-bg auth-blob-1 decor spin-slow"></div>
    <div class="blob-bg auth-blob-2 decor spin-slower"></div>

    <div class="container auth-container">
      <div class="auth-split animate-fade-up" style="max-width: 500px; min-height: auto;">
        
        <!-- Form Side Only for Update Password -->
        <div class="auth-form-panel" style="width: 100%;">
          <a href="#" class="logo-header text-center" style="justify-content: center;">
            <span class="logo-mark">
              <svg viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="26" r="17" fill="rgb(165,175,121)"/>
                <path d="M24 6 L38 12 L24 18 L10 12 Z" fill="rgb(232,160,124)"/>
                <path d="M14 14 V22" stroke="rgb(232,160,124)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="19" cy="25" r="2.4" fill="#4F4428"/>
                <circle cx="29" cy="25" r="2.4" fill="#4F4428"/>
                <path d="M18 32c2.5 3 9.5 3 12 0" stroke="#4F4428" stroke-width="2.4" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            Blip
          </a>

          <div class="auth-header animate-fade-up delay-1 text-center" style="text-align: center;">
            <h1>Create New Password</h1>
            <p>Your new password must be different from previous used passwords.</p>
          </div>

          <form id="updatePasswordForm" class="auth-form animate-fade-up delay-2" novalidate>
            <div class="form-group">
              <label for="newPassword" class="form-label">New Password</label>
              <div class="form-input-wrap">
                <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required>
                <button type="button" class="input-icon clickable password-toggle" data-target="newPassword" aria-label="Toggle password visibility">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
              </div>
              <div class="password-strength">
                <div class="strength-bar" id="updateStrengthBar"></div>
              </div>
              <div class="strength-text" id="updateStrengthText"></div>
              <span class="form-error-text" id="newPasswordError"></span>
            </div>

            <div class="form-group">
              <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
              <div class="form-input-wrap">
                <input type="password" id="confirmNewPassword" class="form-input" placeholder="Repeat new password" required>
                <button type="button" class="input-icon clickable password-toggle" data-target="confirmNewPassword" aria-label="Toggle password visibility">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
              </div>
              <span class="form-error-text" id="confirmNewPasswordError"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">Reset Password</button>
          </form>

        </div>
      </div>
    </div>
    
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3>Password Reset!</h3>
      <p>Your password has been successfully updated. Redirecting you to login...</p>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
