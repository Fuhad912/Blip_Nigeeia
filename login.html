<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Blip | Learning Just Got More Fun</title>
  <meta name="description" content="Login to your Blip account and join live classes.">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  
  <!-- Page Transition Overlay -->
  <div class="page-transition" id="pageTransition">
    <div class="loader-blob"></div>
  </div>

  <main class="auth-wrapper">
    <!-- Decorative background blobs -->
    <div class="blob-bg auth-blob-1 decor spin-slow"></div>
    <div class="blob-bg auth-blob-2 decor spin-slower"></div>

    <div class="container auth-container">
      <div class="auth-split animate-fade-up">
        
        <!-- Art Side (Desktop only) -->
        <div class="auth-art">
          <a href="#" class="logo-header" style="color: white; margin-bottom: 0;">
            <span class="logo-mark">
              <svg viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="26" r="17" fill="rgb(165,175,121)"/>
                <path d="M24 6 L38 12 L24 18 L10 12 Z" fill="rgb(232,160,124)"/>
                <path d="M14 14 V22" stroke="rgb(232,160,124)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="19" cy="25" r="2.4" fill="#4F4428"/>
                <circle cx="29" cy="25" r="2.4" fill="#4F4428"/>
                <path d="M18 32c2.5 3 9.5 3 12 0" stroke="#4F4428" stroke-width="2.4" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            Blip
          </a>
          <div class="art-mascot-container">
            <svg class="decor float-a" viewBox="0 0 220 220" width="200">
              <ellipse cx="110" cy="205" rx="70" ry="10" fill="rgba(255,255,255,0.15)"/>
              <path d="M110 30c48 0 78 34 78 82s-34 84-78 84-78-36-78-84 30-82 78-82z" fill="#F6C9B0"/>
              <circle cx="86" cy="118" r="9" fill="#4F4428"/>
              <circle cx="134" cy="118" r="9" fill="#4F4428"/>
              <circle cx="89" cy="115" r="2.4" fill="#fff"/>
              <circle cx="137" cy="115" r="2.4" fill="#fff"/>
              <ellipse cx="72" cy="138" rx="10" ry="6" fill="#D67C55" opacity="0.6"/>
              <ellipse cx="148" cy="138" rx="10" ry="6" fill="#D67C55" opacity="0.6"/>
              <path d="M78 140c10 18 54 18 64 0" stroke="#4F4428" stroke-width="6" stroke-linecap="round" fill="none"/>
            </svg>
            <div class="decor float-b" style="left: -10%; top: 20%;">
              <svg width="60" height="60" viewBox="0 0 64 64"><rect x="8" y="14" width="48" height="38" rx="6" fill="#A5AF79"/><rect x="12" y="10" width="40" height="10" rx="3" fill="#EFE7D6"/><line x1="32" y1="14" x2="32" y2="52" stroke="rgba(79,68,40,0.2)" stroke-width="2"/></svg>
            </div>
            <div class="decor spin-slow twinkle" style="right: 5%; bottom: 30%;">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6 4.6 2.3 7.2L12 16.4 5.7 21l2.3-7.2-6-4.6h7.6z" fill="#FACC15"/></svg>
            </div>
          </div>
          <div class="art-content">
            <h2>Welcome back!</h2>
            <p>Ready to pick up where you left off? Let's make learning fun today.</p>
          </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-panel">
          <a href="#" class="logo-header">
            <span class="logo-mark">
              <svg viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="26" r="17" fill="rgb(165,175,121)"/>
                <path d="M24 6 L38 12 L24 18 L10 12 Z" fill="rgb(232,160,124)"/>
                <path d="M14 14 V22" stroke="rgb(232,160,124)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="19" cy="25" r="2.4" fill="#4F4428"/>
                <circle cx="29" cy="25" r="2.4" fill="#4F4428"/>
                <path d="M18 32c2.5 3 9.5 3 12 0" stroke="#4F4428" stroke-width="2.4" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            Blip
          </a>

          <div class="auth-header animate-fade-up delay-1">
            <h1>Log In</h1>
            <p>Enter your details to access your classes.</p>
          </div>

          <button class="btn btn-secondary btn-block animate-fade-up delay-1 btn-google" style="margin-bottom: 24px;">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>

          <div class="auth-divider animate-fade-up delay-1">or log in with email</div>

          <form id="loginForm" class="auth-form animate-fade-up delay-2" novalidate>
            <div class="form-group">
              <label for="email" class="form-label">Email Address</label>
              <div class="form-input-wrap">
                <input type="email" id="email" class="form-input" placeholder="e.g. student@blip.com" required>
              </div>
              <span class="form-error-text" id="emailError"></span>
            </div>

            <div class="form-group">
              <label for="password" class="form-label">
                Password
                <a href="forgot-password.html" class="auth-link" style="font-size: 13px; font-weight: 600;">Forgot?</a>
              </label>
              <div class="form-input-wrap">
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                <button type="button" class="input-icon clickable password-toggle" data-target="password" aria-label="Toggle password visibility">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
              </div>
              <span class="form-error-text" id="passwordError"></span>
            </div>

            <div class="form-group">
              <label class="form-checkbox-wrap">
                <input type="checkbox" id="remember" class="form-checkbox">
                <span class="checkbox-label">Remember me for 30 days</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">Log In</button>
          </form>

          <div class="auth-footer animate-fade-up delay-3">
            New to Blip? <a href="signup.html" class="auth-link">Create an account</a>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3>Success!</h3>
      <p>Redirecting you to the classroom...</p>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
