<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Blip | Learning Just Got More Fun</title>
  <meta name="description" content="Reset your Blip password.">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  
  <div class="page-transition" id="pageTransition">
    <div class="loader-blob"></div>
  </div>

  <main class="auth-wrapper" style="align-items: center; justify-content: center;">
    <div class="blob-bg auth-blob-1 decor spin-slow"></div>
    <div class="blob-bg auth-blob-2 decor spin-slower"></div>

    <div class="container auth-container">
      <div class="auth-split animate-fade-up" style="max-width: 500px; min-height: auto;">
        
        <!-- Form Side Only for Forgot Password -->
        <div class="auth-form-panel" style="width: 100%;">
          <a href="#" class="logo-header text-center" style="justify-content: center;">
            <span class="logo-mark">
              <svg viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="26" r="17" fill="rgb(165,175,121)"/>
                <path d="M24 6 L38 12 L24 18 L10 12 Z" fill="rgb(232,160,124)"/>
                <path d="M14 14 V22" stroke="rgb(232,160,124)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="19" cy="25" r="2.4" fill="#4F4428"/>
                <circle cx="29" cy="25" r="2.4" fill="#4F4428"/>
                <path d="M18 32c2.5 3 9.5 3 12 0" stroke="#4F4428" stroke-width="2.4" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            Blip
          </a>

          <div class="auth-header animate-fade-up delay-1 text-center" style="text-align: center;">
            <h1>Reset Password</h1>
            <p>Enter your email to get a reset link.</p>
          </div>

          <form id="forgotForm" class="auth-form animate-fade-up delay-2" novalidate>
            <div class="form-group">
              <label for="email" class="form-label">Email Address</label>
              <div class="form-input-wrap">
                <input type="email" id="email" class="form-input" placeholder="e.g. student@blip.com" required>
              </div>
              <span class="form-error-text" id="emailError"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">Send Reset Link</button>
          </form>

          <div class="auth-footer animate-fade-up delay-3">
            <a href="login.html" class="auth-link" style="display: inline-flex; align-items: center; gap: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h3>Check Your Email!</h3>
      <p>We've sent password reset instructions to your inbox.</p>
      <a href="login.html" class="btn btn-primary" style="margin-top: 24px;">Return to Login</a>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
