<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating - Blip | Learning Just Got More Fun</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    .auth-loader-container {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .loader-mascot {
      width: 140px;
      height: 140px;
      margin: 0 auto 32px;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    .mascot-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 20px rgba(130, 113, 72, 0.2));
    }

    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      margin-left: -110px;
      margin-top: -110px;
      border: 3px dashed rgba(var(--rgb-primary), 0.4);
      border-radius: 50%;
      animation: spin 12s linear infinite;
      z-index: -1;
    }

    .orbit-item {
      position: absolute;
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .orbit-item:nth-child(1) { top: -16px; left: 50%; margin-left: -16px; }
    .orbit-item:nth-child(2) { bottom: 20px; right: 10px; }
    .orbit-item:nth-child(3) { bottom: 20px; left: 10px; }

    .loading-text {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--color-ink);
      margin-bottom: 8px;
    }

    .loading-subtext {
      font-size: 16px;
      color: var(--color-text);
      opacity: 0.8;
    }

    .dots::after {
      content: '.';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes dots {
      0%, 20% { color: transparent; text-shadow: .25em 0 0 transparent, .5em 0 0 transparent; }
      40% { color: var(--color-ink); text-shadow: .25em 0 0 transparent, .5em 0 0 transparent; }
      60% { text-shadow: .25em 0 0 var(--color-ink), .5em 0 0 transparent; }
      80%, 100% { text-shadow: .25em 0 0 var(--color-ink), .5em 0 0 var(--color-ink); }
    }
  </style>
</head>
<body>

  <!-- Decorative background blobs -->
  <div class="blob-bg auth-blob-1 decor spin-slow" style="width: 50vw; height: 50vw; top: -10vw; left: -10vw; background: radial-gradient(circle, rgba(var(--rgb-primary),0.2), transparent 70%);"></div>
  <div class="blob-bg auth-blob-2 decor spin-slower" style="width: 60vw; height: 60vw; bottom: -20vw; right: -20vw; background: radial-gradient(circle, rgba(var(--rgb-secondary),0.15), transparent 70%);"></div>

  <div class="auth-loader-container animate-fade-up">
    
    <div class="loader-mascot">
      <div class="orbit-ring">
        <div class="orbit-item" style="animation: spin 12s linear infinite reverse;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.64 12.2c0-.82-.07-1.61-.21-2.38H12v4.51h6.53a5.54 5.54 0 0 1-2.4 3.63v3.02h3.89c2.28-2.1 3.62-5.19 3.62-8.78z"/><path fill="#34A853" d="M12 24c3.27 0 6.01-1.08 8.02-2.94l-3.89-3.02c-1.09.73-2.48 1.16-4.13 1.16-3.18 0-5.87-2.15-6.84-5.04H1.14v3.13A11.96 11.96 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.16 14.16a7.19 7.19 0 0 1-.37-2.16c0-.75.13-1.48.37-2.16V6.71H1.14A11.97 11.97 0 0 0 0 12c0 1.93.46 3.76 1.28 5.41l3.88-3.25z"/><path fill="#EA4335" d="M12 4.79c1.78 0 3.38.61 4.64 1.82l3.48-3.48C18.01 1.08 15.27 0 12 0 7.42 0 3.4 2.68 1.14 6.71l4.02 3.13c.97-2.89 3.66-5.05 6.84-5.05z"/></svg>
        </div>
        <div class="orbit-item" style="animation: spin 12s linear infinite reverse;"><span style="font-size: 16px;">📚</span></div>
        <div class="orbit-item" style="animation: spin 12s linear infinite reverse;"><span style="font-size: 16px;">✨</span></div>
      </div>
      
      <svg class="mascot-svg" viewBox="0 0 220 220">
        <path d="M110 30c48 0 78 34 78 82s-34 84-78 84-78-36-78-84 30-82 78-82z" fill="rgb(165,175,121)"/>
        <path d="M60 46 L110 24 L160 46 L110 64Z" fill="rgb(232,160,124)"/>
        <rect x="106" y="64" width="8" height="26" fill="rgb(232,160,124)"/>
        <circle cx="86" cy="118" r="9" fill="#4F4428"/>
        <circle cx="134" cy="118" r="9" fill="#4F4428"/>
        <circle cx="89" cy="115" r="2.4" fill="#fff"/>
        <circle cx="137" cy="115" r="2.4" fill="#fff"/>
        <ellipse cx="72" cy="138" rx="10" ry="6" fill="rgb(232,160,124)" opacity="0.6"/>
        <ellipse cx="148" cy="138" rx="10" ry="6" fill="rgb(232,160,124)" opacity="0.6"/>
        <path d="M90 145 q 20 15 40 0" stroke="#4F4428" stroke-width="5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>

    <div class="loading-text">Connecting to Google<span class="dots"></span></div>
    <div class="loading-subtext">Preparing your virtual desk...</div>

  </div>

  <script>
    // Simulate auth redirect
    setTimeout(() => {
      document.querySelector('.loading-text').innerHTML = 'Success!';
      document.querySelector('.loading-subtext').innerHTML = 'Redirecting to your dashboard...';
      document.querySelector('.mascot-svg path:last-child').setAttribute('d', 'M78 140c10 18 54 18 64 0'); // bigger smile
    }, 2500);
  </script>
</body>
</html>
